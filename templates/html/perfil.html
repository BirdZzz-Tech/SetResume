<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="shortcut icon" href="/static/img/Logo.png" type="image/x-icon">
<link rel="stylesheet" href="{% static 'css/perfil.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="perfil-container">
        <div class="avatar-area">
            <input type="file" id="fotoInput" style="display: none;" accept="image/*">
            <label for="fotoInput" class="circulo-avatar-clicavel">
                <div class="foto-wrapper">
                    <i class="bi bi-person" id="fotoPadrao"></i>
                    <img id="fotoPreview" src="" alt="Preview"
                        style="display: none; width: 100%; height: 100%; object-fit: cover;">
                </div>
                <span class="mensagem-mudar-avatar">Mudar seu avatar</span>
            </label>
        </div>

        <div class="formulario-area">
            <div class="campo-grupo">
                <label class="rotulo-campo">Nome</label>
                <input type="text" id="nome" class="entrada-texto">
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Email Público</label>
                <input type="email" id="email" class="entrada-texto">
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Bio</label>
                <textarea id="bio" class="entrada-texto"></textarea>
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Pronomes</label>
                <select id="pronomes" class="entrada-texto">
                    <option value="">Não específico</option>
                    <option value="ele">Ele/Dele</option>
                    <option value="ela">Ela/Dela</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Localização</label>
                <input type="text" id="cidade" class="entrada-texto">
            </div>
        </div>

        <div class="acoes-area">
            <button id="salvarPerfil" class="btn-salvar">Salvar Alterações</button>
            <button id="Limpar" class="btn-limpar">Limpar Dados</button>
            <button id="Voltar" class="btn-voltar" style="background:transparent; border:none; cursor:pointer;"><a href="home.html">Voltar</a></button>
        </div>
    </div>

    <script>
        const fotoInput = document.getElementById('fotoInput');
        const fotoPreview = document.getElementById('fotoPreview');
        const fotoPadrao = document.getElementById('fotoPadrao');
        const btnSalvar = document.getElementById('salvarPerfil');

        const campos = ['nome', 'email', 'bio', 'cidade', 'pronomes', 'social1', 'social2', 'social3', 'social4', 'empresa', 'site'];
        window.onload = () => {
            const fotoSalva = localStorage.getItem('foto');
            if (fotoSalva) {
                fotoPreview.src = fotoSalva;
                fotoPreview.style.display = 'block';
                fotoPadrao.style.display = 'none';
            }

            campos.forEach(id => {
                const elemento = document.getElementById(id);
                if (elemento && localStorage.getItem(id)) {
                    elemento.value = localStorage.getItem(id);
                }
            });
        };
        fotoInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    fotoPreview.src = e.target.result;
                    fotoPreview.style.display = 'block';
                    fotoPadrao.style.display = 'none';
                    localStorage.setItem('foto', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });
        btnSalvar.addEventListener('click', () => {
            campos.forEach(id => {
                const valor = document.getElementById(id).value;
                localStorage.setItem(id, valor);
            });
            alert('Perfil salvo com sucesso!');
        });
        document.getElementById('limparPerfil').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });
    </script>
</body>

</html>
