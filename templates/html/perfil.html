<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="shortcut icon" href="/static/img/Logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/perfil.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="perfil-container">

        <div class="avatar-area">
            <input type="file" id="fotoInput" style="display:none;" accept="image/*">
            <label for="fotoInput" class="circulo-avatar-clicavel">
                <div class="foto-wrapper">
                    <i class="bi bi-person" id="fotoPadrao"></i>
                    <img id="fotoPreview" src="" alt="Preview"
                        style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                </div>
                <span class="mensagem-mudar-avatar">Mudar avatar</span>
            </label>
        </div>

        <div class="formulario-area">
            <div class="campo-grupo">
                <label class="rotulo-campo">Nome</label>
                <input type="text" id="nome" class="entrada-texto" placeholder="Seu nome">
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Email Público</label>
                <input type="email" id="email" class="entrada-texto" placeholder="seu@email.com">
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Bio</label>
                <textarea id="bio" class="entrada-texto" rows="3" placeholder="Fale um pouco sobre você..."></textarea>
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Pronomes</label>
                <select id="pronomes" class="entrada-texto">
                    <option value="">Não específico</option>
                    <option value="ele">Ele/Dele</option>
                    <option value="ela">Ela/Dela</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label class="rotulo-campo">Localização</label>
                <input type="text" id="cidade" class="entrada-texto" placeholder="Cidade, País">
            </div>
        </div>

        <div class="acoes-area">
            <button id="salvarPerfil" class="btn-salvar">
                <i class="bi bi-check-lg"></i> Salvar Alterações
            </button>
            <button id="btnLimpar" class="btn-limpar">
                <i class="bi bi-trash"></i> Limpar Dados
            </button>
            <a href="home.html" style="color: #8890B0; text-decoration: none;" class="btn-voltar">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <script>
        const fotoInput = document.getElementById('fotoInput');
        const fotoPreview = document.getElementById('fotoPreview');
        const fotoPadrao = document.getElementById('fotoPadrao');

        window.onload = () => {
            const fotoSalva = localStorage.getItem('perfil_foto');
            if (fotoSalva) {
                fotoPreview.src = fotoSalva;
                fotoPreview.style.display = 'block';
                fotoPadrao.style.display = 'none';
            }
        };

        fotoInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                fotoPreview.src = e.target.result;
                fotoPreview.style.display = 'block';
                fotoPadrao.style.display = 'none';
                localStorage.setItem('perfil_foto', e.target.result);
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>

</html>
